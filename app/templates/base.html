<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Automite AI{% endblock %} — Intelligent Automation</title>
    <meta name="description" content="{% block meta_description %}Automite AI — Intelligent Automation. Simplified.{% endblock %}">
    {% block meta_extra %}{% endblock %}
    <link rel="icon" type="image/jpeg" href="/automiteui/static/images/icon.jpeg">
    <link rel="stylesheet" href="/automiteui/static/css/automite.css">
    {% block head_extra %}{% endblock %}
</head>
<body>
    {% block navbar %}{% endblock %}

    <main class="{% block main_class %}main-content{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    <script src="/automiteui/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
